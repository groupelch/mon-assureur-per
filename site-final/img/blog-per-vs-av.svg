<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2347"/>
      <stop offset="100%" style="stop-color:#1A3A6B"/>
    </linearGradient>
    <linearGradient id="cardL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E4A8A"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="cardR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065F46"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <rect width="600" height="340" fill="url(#bgL)"/>

  <!-- VS badge central -->
  <circle cx="300" cy="170" r="28" fill="rgba(245,158,11,0.9)"/>
  <text x="300" y="177" text-anchor="middle" fill="#fff" font-size="16" font-family="Inter,sans-serif" font-weight="800">VS</text>

  <!-- Left card: PER -->
  <rect x="30" y="50" width="240" height="240" rx="16" fill="url(#cardL)"/>
  <text x="150" y="90" text-anchor="middle" fill="#FCD34D" font-size="15" font-family="Inter,sans-serif" font-weight="800" letter-spacing="1">PER</text>
  <text x="150" y="108" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-family="Inter,sans-serif">Plan Épargne Retraite</text>

  <!-- PER checkmarks -->
  <circle cx="60" cy="135" r="9" fill="rgba(252,211,77,0.25)" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="60" y="140" text-anchor="middle" fill="#FCD34D" font-size="10" font-family="Inter,sans-serif">✓</text>
  <text x="78" y="140" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Inter,sans-serif">Déduction entrée</text>

  <circle cx="60" cy="162" r="9" fill="rgba(252,211,77,0.25)" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="60" y="167" text-anchor="middle" fill="#FCD34D" font-size="10" font-family="Inter,sans-serif">✓</text>
  <text x="78" y="167" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Inter,sans-serif">Économie immédiate</text>

  <circle cx="60" cy="189" r="9" fill="rgba(252,211,77,0.25)" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="60" y="194" text-anchor="middle" fill="#FCD34D" font-size="10" font-family="Inter,sans-serif">✓</text>
  <text x="78" y="194" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Inter,sans-serif">Idéal TMI 30%+</text>

  <circle cx="60" cy="216" r="9" fill="rgba(255,100,100,0.2)" stroke="rgba(255,100,100,0.5)" stroke-width="1.5"/>
  <text x="60" y="221" text-anchor="middle" fill="rgba(255,150,150,0.8)" font-size="10" font-family="Inter,sans-serif">~</text>
  <text x="78" y="221" fill="rgba(255,255,255,0.55)" font-size="11" font-family="Inter,sans-serif">Fiscalité à la sortie</text>

  <text x="150" y="265" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">Jusqu'à 85 780€ déductibles</text>

  <!-- Right card: Assurance vie -->
  <rect x="330" y="50" width="240" height="240" rx="16" fill="url(#cardR)"/>
  <text x="450" y="90" text-anchor="middle" fill="#34D399" font-size="14" font-family="Inter,sans-serif" font-weight="800" letter-spacing="1">ASSURANCE VIE</text>
  <text x="450" y="108" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-family="Inter,sans-serif">Épargne à long terme</text>

  <!-- AV checkmarks -->
  <circle cx="360" cy="135" r="9" fill="rgba(52,211,153,0.25)" stroke="#34D399" stroke-width="1.5"/>
  <text x="360" y="140" text-anchor="middle" fill="#34D399" font-size="10" font-family="Inter,sans-serif">✓</text>
  <text x="378" y="140" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Inter,sans-serif">Gains exonérés 8 ans</text>

  <circle cx="360" cy="162" r="9" fill="rgba(52,211,153,0.25)" stroke="#34D399" stroke-width="1.5"/>
  <text x="360" y="167" text-anchor="middle" fill="#34D399" font-size="10" font-family="Inter,sans-serif">✓</text>
  <text x="378" y="167" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Inter,sans-serif">Disponibilité totale</text>

  <circle cx="360" cy="189" r="9" fill="rgba(52,211,153,0.25)" stroke="#34D399" stroke-width="1.5"/>
  <text x="360" y="194" text-anchor="middle" fill="#34D399" font-size="10" font-family="Inter,sans-serif">✓</text>
  <text x="378" y="194" fill="rgba(255,255,255,0.85)" font-size="11" font-family="Inter,sans-serif">Succession optimisée</text>

  <circle cx="360" cy="216" r="9" fill="rgba(255,100,100,0.2)" stroke="rgba(255,100,100,0.5)" stroke-width="1.5"/>
  <text x="360" y="221" text-anchor="middle" fill="rgba(255,150,150,0.8)" font-size="10" font-family="Inter,sans-serif">~</text>
  <text x="378" y="221" fill="rgba(255,255,255,0.55)" font-size="11" font-family="Inter,sans-serif">Pas de déduction entrée</text>

  <text x="450" y="265" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">4 600€ d'abattement/an</text>

  <!-- Bottom -->
  <text x="300" y="320" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" font-family="Inter,sans-serif">Les deux peuvent être complémentaires</text>
</svg>
