<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Fond noir cercle -->
  <circle cx="60" cy="60" r="59" fill="#000"/>

  <!-- Bordure extérieure blanche -->
  <circle cx="60" cy="60" r="57" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#fff" stroke-width="0.7"/>

  <!-- Texte circulaire haut : MON-ASSUREUR.COM -->
  <path id="top-arc" d="M 15,60 A 45,45 0 0,1 105,60" fill="none"/>
  <text font-family="Georgia, serif" font-size="8.5" font-weight="700" fill="#fff" letter-spacing="2">
    <textPath href="#top-arc" startOffset="8%">MON-ASSUREUR.COM</textPath>
  </text>

  <!-- Texte circulaire bas : COURTAGE EN ASSURANCE -->
  <path id="bot-arc" d="M 12,65 A 48,48 0 0,0 108,65" fill="none"/>
  <text font-family="Georgia, serif" font-size="7.5" font-weight="600" fill="#fff" letter-spacing="1.5">
    <textPath href="#bot-arc" startOffset="5%">COURTAGE EN ASSURANCE</textPath>
  </text>

  <!-- Pilier (colonnes) -->
  <!-- Entablature (chapeau) -->
  <rect x="36" y="34" width="48" height="6" rx="1" fill="#fff"/>
  <!-- Texte ASSURANCE sur le pilier -->
  <rect x="39" y="42" width="42" height="9" rx="1" fill="#fff"/>
  <text x="60" y="50.5" text-anchor="middle" font-family="Georgia, serif" font-size="6.5" font-weight="700" fill="#000" letter-spacing="1">ASSURANCE</text>
  <!-- Les colonnes -->
  <rect x="40" y="51" width="4" height="24" fill="#fff"/>
  <rect x="49" y="51" width="4" height="24" fill="#fff"/>
  <rect x="58" y="51" width="4" height="24" fill="#fff"/>
  <rect x="67" y="51" width="4" height="24" fill="#fff"/>
  <rect x="76" y="51" width="4" height="24" fill="#fff"/>
  <!-- Base des colonnes avec effet goutte -->
  <ellipse cx="42" cy="75" rx="3" ry="1.5" fill="#fff" opacity="0.6"/>
  <rect x="40" y="75" width="4" height="4" rx="0" fill="#fff" opacity="0.3"/>
  <ellipse cx="51" cy="75" rx="3" ry="1.5" fill="#fff" opacity="0.6"/>
  <rect x="49" y="75" width="4" height="4" rx="0" fill="#fff" opacity="0.3"/>
  <ellipse cx="60" cy="75" rx="3" ry="1.5" fill="#fff" opacity="0.6"/>
  <rect x="58" y="75" width="4" height="4" rx="0" fill="#fff" opacity="0.3"/>
  <ellipse cx="69" cy="75" rx="3" ry="1.5" fill="#fff" opacity="0.6"/>
  <rect x="67" y="75" width="4" height="4" rx="0" fill="#fff" opacity="0.3"/>
  <ellipse cx="78" cy="75" rx="3" ry="1.5" fill="#fff" opacity="0.6"/>
  <rect x="76" y="75" width="4" height="4" rx="0" fill="#fff" opacity="0.3"/>

  <!-- Séparateurs horizontaux -->
  <line x1="20" y1="78" x2="100" y2="78" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>
  <line x1="20" y1="32" x2="100" y2="32" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>

  <!-- Points bleu et rouge -->
  <circle cx="20" cy="60" r="4" fill="#3B82F6"/>
  <circle cx="100" cy="60" r="4" fill="#EF4444"/>
</svg>
