<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2347"/>
      <stop offset="100%" style="stop-color:#1A3A6B"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <circle cx="510" cy="50" r="100" fill="rgba(37,99,235,0.08)"/>

  <!-- Title -->
  <text x="300" y="46" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="14" font-family="Inter,sans-serif" font-weight="700">TRANCHES MARGINALES D'IMPOSITION 2026</text>

  <!-- Bracket rows -->
  <!-- 0% -->
  <rect x="40" y="62" width="520" height="38" rx="6" fill="rgba(255,255,255,0.04)"/>
  <rect x="40" y="62" width="40" height="38" rx="6" fill="rgba(148,163,184,0.3)"/>
  <text x="60" y="87" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="14" font-family="Inter,sans-serif" font-weight="700">0%</text>
  <text x="160" y="87" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,sans-serif">Jusqu'à 11 497 €</text>
  <text x="460" y="87" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11" font-family="Inter,sans-serif">Pas d'impôt</text>

  <!-- 11% -->
  <rect x="40" y="108" width="520" height="38" rx="6" fill="rgba(37,99,235,0.08)"/>
  <rect x="40" y="108" width="70" height="38" rx="6" fill="rgba(37,99,235,0.4)"/>
  <text x="75" y="133" text-anchor="middle" fill="#fff" font-size="14" font-family="Inter,sans-serif" font-weight="700">11%</text>
  <text x="180" y="133" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,sans-serif">11 497 € – 29 315 €</text>
  <text x="460" y="133" text-anchor="middle" fill="#60A5FA" font-size="11" font-family="Inter,sans-serif">Économie: 11€/100€ versés</text>

  <!-- 30% -->
  <rect x="40" y="154" width="520" height="38" rx="6" fill="rgba(245,158,11,0.08)"/>
  <rect x="40" y="154" width="155" height="38" rx="6" fill="rgba(245,158,11,0.45)"/>
  <text x="115" y="179" text-anchor="middle" fill="#fff" font-size="14" font-family="Inter,sans-serif" font-weight="700">30%</text>
  <text x="250" y="179" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,sans-serif">29 315 € – 83 823 €</text>
  <text x="460" y="179" text-anchor="middle" fill="#FCD34D" font-size="11" font-family="Inter,sans-serif" font-weight="600">Économie: 30€/100€ versés</text>

  <!-- 41% -->
  <rect x="40" y="200" width="520" height="38" rx="6" fill="rgba(239,68,68,0.08)"/>
  <rect x="40" y="200" width="235" height="38" rx="6" fill="rgba(239,68,68,0.45)"/>
  <text x="155" y="225" text-anchor="middle" fill="#fff" font-size="14" font-family="Inter,sans-serif" font-weight="700">41%</text>
  <text x="330" y="225" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,sans-serif">83 823 € – 180 294 €</text>
  <text x="490" y="225" text-anchor="middle" fill="#FCA5A5" font-size="11" font-family="Inter,sans-serif" font-weight="600">41€/100€</text>

  <!-- 45% -->
  <rect x="40" y="246" width="520" height="38" rx="6" fill="rgba(239,68,68,0.12)"/>
  <rect x="40" y="246" width="280" height="38" rx="6" fill="rgba(185,28,28,0.55)"/>
  <text x="175" y="271" text-anchor="middle" fill="#fff" font-size="14" font-family="Inter,sans-serif" font-weight="700">45%</text>
  <text x="380" y="271" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,sans-serif">Au-delà de 180 294 €</text>
  <text x="540" y="271" text-anchor="middle" fill="#FCA5A5" font-size="11" font-family="Inter,sans-serif" font-weight="600">45€/100€</text>

  <!-- Arrow and note -->
  <path d="M420 300 L540 300" stroke="rgba(52,211,153,0.5)" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="rgba(52,211,153,0.7)"/>
    </marker>
  </defs>
  <text x="300" y="316" text-anchor="middle" fill="rgba(52,211,153,0.8)" font-size="11" font-family="Inter,sans-serif" font-weight="600">↑ Plus votre TMI est élevée, plus le PER est rentable</text>
</svg>
