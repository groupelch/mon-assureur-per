<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2347"/>
      <stop offset="100%" style="stop-color:#1A3A6B"/>
    </linearGradient>
    <linearGradient id="card" x1="135deg" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#243B6E"/>
    </linearGradient>
  </defs>

  <rect width="600" height="340" fill="url(#bg)"/>
  <circle cx="520" cy="60" r="110" fill="rgba(245,158,11,0.06)"/>
  <circle cx="80" cy="280" r="80" fill="rgba(37,99,235,0.06)"/>

  <!-- Building icon (simplified) -->
  <rect x="260" y="60" width="80" height="90" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="270" y="75" width="15" height="15" rx="2" fill="rgba(37,99,235,0.6)"/>
  <rect x="295" y="75" width="15" height="15" rx="2" fill="rgba(37,99,235,0.6)"/>
  <rect x="320" y="75" width="15" height="15" rx="2" fill="rgba(37,99,235,0.6)"/>
  <rect x="270" y="100" width="15" height="15" rx="2" fill="rgba(37,99,235,0.4)"/>
  <rect x="295" y="100" width="15" height="15" rx="2" fill="rgba(245,158,11,0.7)"/>
  <rect x="320" y="100" width="15" height="15" rx="2" fill="rgba(37,99,235,0.4)"/>
  <rect x="285" y="130" width="30" height="20" rx="2" fill="rgba(255,255,255,0.08)"/>

  <!-- Arrow down then up -->
  <path d="M220 120 L140 120 L140 200" stroke="rgba(245,158,11,0.5)" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>
  <path d="M380 120 L460 120 L460 200" stroke="rgba(52,211,153,0.5)" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>

  <!-- Left card: Revenu dirigeant -->
  <rect x="40" y="195" width="200" height="115" rx="12" fill="rgba(30,58,138,0.5)" stroke="rgba(245,158,11,0.3)" stroke-width="1.5"/>
  <text x="140" y="220" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="10" font-family="Inter,sans-serif" font-weight="600" letter-spacing="1">RÉMUNÉRATION</text>
  <text x="140" y="246" text-anchor="middle" fill="#FCD34D" font-size="24" font-family="Inter,sans-serif" font-weight="800">120 000 €</text>
  <text x="140" y="264" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">TMI 41% — Impôt important</text>
  <rect x="60" y="275" width="160" height="24" rx="6" fill="rgba(245,158,11,0.15)"/>
  <text x="140" y="292" text-anchor="middle" fill="#FCD34D" font-size="11" font-family="Inter,sans-serif" font-weight="600">Versement PER: 15 000€</text>

  <!-- Right card: Économie -->
  <rect x="360" y="195" width="200" height="115" rx="12" fill="rgba(5,150,105,0.25)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="460" y="220" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="10" font-family="Inter,sans-serif" font-weight="600" letter-spacing="1">ÉCONOMIE RÉALISÉE</text>
  <text x="460" y="246" text-anchor="middle" fill="#34D399" font-size="24" font-family="Inter,sans-serif" font-weight="800">6 150 €</text>
  <text x="460" y="264" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">Effort réel: 8 850 €</text>
  <rect x="380" y="275" width="160" height="24" rx="6" fill="rgba(52,211,153,0.15)"/>
  <text x="460" y="292" text-anchor="middle" fill="#34D399" font-size="11" font-family="Inter,sans-serif" font-weight="600">41% d'économie sur versement</text>

  <!-- Title -->
  <text x="300" y="330" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" font-family="Inter,sans-serif" letter-spacing="1">PER POUR DIRIGEANTS DE SOCIÉTÉ</text>
</svg>
