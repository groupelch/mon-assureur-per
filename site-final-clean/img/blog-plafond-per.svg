<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A6B"/>
      <stop offset="100%" style="stop-color:#0F2347"/>
    </linearGradient>
    <linearGradient id="progress1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FCD34D"/>
    </linearGradient>
    <linearGradient id="progress2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="progress3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>

  <rect width="600" height="340" fill="url(#bg)"/>
  <circle cx="550" cy="30" r="100" fill="rgba(245,158,11,0.07)"/>
  <circle cx="50" cy="310" r="80" fill="rgba(37,99,235,0.07)"/>

  <!-- Title -->
  <text x="300" y="46" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="16" font-family="Inter,sans-serif" font-weight="700">PLAFONDS DE DÉDUCTION PER 2026</text>
  <line x1="100" y1="58" x2="500" y2="58" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Row 1: Salarié -->
  <text x="60" y="100" fill="rgba(255,255,255,0.6)" font-size="12" font-family="Inter,sans-serif">Salarié / Cadre</text>
  <rect x="60" y="110" width="420" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
  <rect x="60" y="110" width="168" height="22" rx="11" fill="url(#progress1)"/>
  <text x="490" y="126" fill="#FCD34D" font-size="13" font-family="Inter,sans-serif" font-weight="700">35 194 €</text>

  <!-- Row 2: Dirigeant -->
  <text x="60" y="160" fill="rgba(255,255,255,0.6)" font-size="12" font-family="Inter,sans-serif">Dirigeant assimilé-salarié</text>
  <rect x="60" y="170" width="420" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
  <rect x="60" y="170" width="168" height="22" rx="11" fill="url(#progress1)" opacity="0.8"/>
  <text x="490" y="186" fill="#FCD34D" font-size="13" font-family="Inter,sans-serif" font-weight="700">35 194 €</text>

  <!-- Row 3: TNS -->
  <text x="60" y="220" fill="rgba(255,255,255,0.6)" font-size="12" font-family="Inter,sans-serif">TNS / Indépendant / Profession libérale</text>
  <rect x="60" y="230" width="420" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
  <rect x="60" y="230" width="420" height="22" rx="11" fill="url(#progress2)"/>
  <text x="490" y="246" fill="#34D399" font-size="13" font-family="Inter,sans-serif" font-weight="800">85 780 €</text>

  <!-- Row 4: Min -->
  <text x="60" y="280" fill="rgba(255,255,255,0.6)" font-size="12" font-family="Inter,sans-serif">Plancher minimum (si revenus faibles)</text>
  <rect x="60" y="290" width="420" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
  <rect x="60" y="290" width="22" height="22" rx="11" fill="url(#progress3)"/>
  <text x="490" y="306" fill="rgba(255,255,255,0.6)" font-size="13" font-family="Inter,sans-serif" font-weight="600">4 399 €</text>

  <!-- Legend badge -->
  <rect x="60" y="312" width="200" height="20" rx="4" fill="rgba(245,158,11,0.15)" />
  <text x="160" y="326" text-anchor="middle" fill="rgba(245,158,11,0.9)" font-size="10" font-family="Inter,sans-serif" font-weight="600">Plafonds reportables 3 ans !</text>
</svg>
