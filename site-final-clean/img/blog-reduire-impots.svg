<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2347"/>
      <stop offset="100%" style="stop-color:#1E4A8A"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="520" cy="50" r="90" fill="rgba(37,99,235,0.12)"/>
  <circle cx="80" cy="290" r="60" fill="rgba(245,158,11,0.08)"/>

  <!-- Grid lines -->
  <line x1="80" y1="60" x2="80" y2="260" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="260" x2="540" y2="260" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="200" x2="540" y2="200" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="150" x2="540" y2="150" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="100" x2="540" y2="100" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bar 1 — Sans PER -->
  <rect x="130" y="95" width="72" height="165" rx="6" fill="url(#bar3)" opacity="0.7"/>
  <text x="166" y="88" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-family="Inter,sans-serif">Sans PER</text>
  <text x="166" y="275" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">Impôt élevé</text>

  <!-- Bar 2 — Avec PER (plus petite = moins d'impôt) -->
  <rect x="264" y="155" width="72" height="105" rx="6" fill="url(#bar2)"/>
  <text x="300" y="148" text-anchor="middle" fill="#34D399" font-size="11" font-family="Inter,sans-serif" font-weight="600">Avec PER</text>
  <text x="300" y="275" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">–30% d'impôt</text>

  <!-- Bar 3 — Économie -->
  <rect x="398" y="95" width="72" height="60" rx="6" fill="url(#bar1)"/>
  <text x="434" y="88" text-anchor="middle" fill="#FCD34D" font-size="11" font-family="Inter,sans-serif" font-weight="700">Économie</text>
  <text x="434" y="275" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">Récupérée</text>

  <!-- Arrow showing decrease -->
  <path d="M202 130 Q240 130 262 155" stroke="#FCD34D" stroke-width="2.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FCD34D"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="318" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="12" font-family="Inter,sans-serif" letter-spacing="1">RÉDUCTION D'IMPÔT AVEC LE PER</text>

  <!-- Euro symbol -->
  <text x="472" y="155" text-anchor="middle" fill="#FCD34D" font-size="28" font-family="Inter,sans-serif" font-weight="800" filter="url(#glow)">€</text>
</svg>
