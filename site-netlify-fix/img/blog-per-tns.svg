<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2347"/>
      <stop offset="100%" style="stop-color:#1A3A6B"/>
    </linearGradient>
    <linearGradient id="progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="progress2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FCD34D"/>
    </linearGradient>
  </defs>

  <rect width="600" height="340" fill="url(#bg)"/>
  <circle cx="540" cy="50" r="100" fill="rgba(5,150,105,0.08)"/>

  <!-- Icon: stethoscope/tools simplified as circle with cross -->
  <circle cx="300" cy="58" r="32" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="2"/>
  <text x="300" y="68" text-anchor="middle" fill="#FCD34D" font-size="24" font-family="Inter,sans-serif">⚕</text>

  <text x="300" y="115" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="14" font-family="Inter,sans-serif" font-weight="700">PROFESSIONS LIBÉRALES &amp; TNS</text>
  <text x="300" y="135" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,sans-serif">Plafond Madelin étendu — jusqu'à 85 780 €/an</text>

  <!-- 3 examples -->
  <!-- Médecin -->
  <rect x="40" y="155" width="160" height="140" rx="12" fill="rgba(30,58,138,0.4)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
  <text x="120" y="180" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">MÉDECIN</text>
  <text x="120" y="198" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12" font-family="Inter,sans-serif">180 000 € BNC</text>
  <rect x="55" y="208" width="130" height="10" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="55" y="208" width="130" height="10" rx="5" fill="url(#progress)" opacity="0.9"/>
  <text x="120" y="238" text-anchor="middle" fill="#34D399" font-size="18" font-family="Inter,sans-serif" font-weight="800">51 480€</text>
  <text x="120" y="254" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">plafond déduction</text>
  <text x="120" y="274" text-anchor="middle" fill="#34D399" font-size="12" font-family="Inter,sans-serif" font-weight="700">Éco: ~21 100€</text>
  <text x="120" y="288" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9" font-family="Inter,sans-serif">à 41%</text>

  <!-- Avocat -->
  <rect x="220" y="155" width="160" height="140" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="300" y="180" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">AVOCAT</text>
  <text x="300" y="198" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12" font-family="Inter,sans-serif">120 000 € BNC</text>
  <rect x="235" y="208" width="130" height="10" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="235" y="208" width="90" height="10" rx="5" fill="url(#progress2)"/>
  <text x="300" y="238" text-anchor="middle" fill="#FCD34D" font-size="18" font-family="Inter,sans-serif" font-weight="800">30 480€</text>
  <text x="300" y="254" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">plafond déduction</text>
  <text x="300" y="274" text-anchor="middle" fill="#FCD34D" font-size="12" font-family="Inter,sans-serif" font-weight="700">Éco: ~12 500€</text>
  <text x="300" y="288" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9" font-family="Inter,sans-serif">à 41%</text>

  <!-- Expert-comptable -->
  <rect x="400" y="155" width="160" height="140" rx="12" fill="rgba(30,58,138,0.4)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
  <text x="480" y="180" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">EXPERT-COMPTABLE</text>
  <text x="480" y="198" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12" font-family="Inter,sans-serif">90 000 € BNC</text>
  <rect x="415" y="208" width="130" height="10" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="415" y="208" width="70" height="10" rx="5" fill="url(#progress)" opacity="0.7"/>
  <text x="480" y="238" text-anchor="middle" fill="#34D399" font-size="18" font-family="Inter,sans-serif" font-weight="800">21 480€</text>
  <text x="480" y="254" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif">plafond déduction</text>
  <text x="480" y="274" text-anchor="middle" fill="#34D399" font-size="12" font-family="Inter,sans-serif" font-weight="700">Éco: ~8 800€</text>
  <text x="480" y="288" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9" font-family="Inter,sans-serif">à 41%</text>

  <text x="300" y="325" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="10" font-family="Inter,sans-serif">Calcul indicatif basé sur barème IRPP 2026</text>
</svg>
